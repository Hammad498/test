<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Coach - Identity Handoff Test</title>
  <style>
    :root { --primary: #111827; --bg: #f9fafb; --card: #ffffff; --success: #10b981; --border: #e5e7eb; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    h2 { margin: 0 0 8px 0; }
    .status { padding: 10px; border-radius: 8px; margin: 12px 0; font-size: 0.9rem; }
    button {
      padding: 14px;
      margin: 6px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .identity-card {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
      display: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>AI Coach Identity Handoff Test</h2>
    <p><strong>Testing Signed Token + Magic Link on Circle Professional Plan</strong></p>

    <div class="status" id="embedInfo"></div>

    <div class="identity-card" id="identityCard">
      <strong>✅ Authenticated:</strong> <span id="name"></span><br>
      <strong>Tier:</strong> <span id="tier"></span><br>
      <strong>Email:</strong> <span id="email"></span>
    </div>

    <div id="testPanel">
      <button onclick="generateAndTest('10K')">Test Signed Token (10K)</button>
      <button onclick="generateAndTest('30K')">Test Signed Token (30K)</button>
      <button onclick="generateAndTest('shared')">Test Signed Token (Shared)</button>
      <button onclick="testMagicLink()">Test Magic Link</button>
    </div>

    <div style="margin-top:20px; font-size:0.85rem; color:#666;">
      <strong>Instructions:</strong> Click buttons → iframe should auto-authenticate.
    </div>
  </div>

  <script>
    // Show embed info
    document.getElementById("embedInfo").innerHTML = `
      Embed: <strong>${window.self !== window.top ? '✅ Inside iframe' : 'Direct'}</strong><br>
      Referrer: ${document.referrer ? document.referrer.substring(0, 60)+'...' : 'None'}
    `;

    function decodeToken(token) {
      try {
        const base64Url = token.split('.')[1] || token;
        const payload = JSON.parse(atob(base64Url.replace(/-/g, '+').replace(/_/g, '/')));
        if (payload.exp * 1000 < Date.now()) return { verified: false, error: "Expired" };
        return { verified: true, ...payload };
      } catch (e) {
        return { verified: false, error: "Decode failed" };
      }
    }

    async function generateAndTest(tier) {
      const payload = {
        name: "Hammad Test User",
        email: "hammadabrar498@gmail.com",
        tier: tier,
        iat: Math.floor(Date.now()/1000),
        exp: Math.floor(Date.now()/1000) + 3600
      };

      // Simulate real JWT (base64 for testing)
      const token = btoa(JSON.stringify(payload));
      const url = `${window.location.origin}${window.location.pathname}?token=${token}`;

      window.history.replaceState({}, '', url);
      location.reload();
    }

    function testMagicLink() {
      const magic = "magic_" + Math.random().toString(36).substring(2,12);
      const url = `${window.location.origin}${window.location.pathname}?magic=${magic}`;
      window.history.replaceState({}, '', url);
      location.reload();
    }

    // Auto handle token on load
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const magic = params.get('magic');

      if (token || magic) {
        let data;
        if (token) {
          data = decodeToken(token);
        } else {
          data = { verified: true, name: "Magic Link User", email: "user@example.com", tier: "10K" };
        }

        if (data.verified) {
          document.getElementById("identityCard").style.display = "block";
          document.getElementById("name").textContent = data.name;
          document.getElementById("tier").textContent = data.tier;
          document.getElementById("email").textContent = data.email;
          document.getElementById("testPanel").style.display = "none";
        } else {
          alert("Verification failed: " + data.error);
        }
      }
    });
  </script>
</body>
</html>
